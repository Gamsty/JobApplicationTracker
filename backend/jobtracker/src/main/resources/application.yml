# Activates application-local.yml for local development (credentials, etc.)
# Safe to commit — on Render/production this file simply doesn't exist and Spring ignores it
# Override by setting SPRING_PROFILES_ACTIVE env var in production
spring:
  profiles:
    active: local
  application:
    name: jobtracker
  # Defer bean construction until first request. Trades ~2-3s first-request latency for
  # a much faster cold start, which matters because the App Insights agent already adds
  # ~30s of class-transformation overhead and Render's free-tier port-scan window is tight.
  main:
    lazy-initialization: true
  datasource:
    # Database configuration — credentials must be set as environment variables in production
    # For local development, set these in application-local.yml
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/jobTracker}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Auto-creates/updates schema on startup
      ddl-auto: ${DDL_AUTO:update}
    # show-sql and verbose logging are disabled in production to reduce noise
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        "[format_sql": true

  # File upload configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 1MB

  # Redis — used by Spring Cache (statistics caching) and the RateLimitFilter (auth brute-force protection).
  # In prod this points at Azure Cache for Redis (port 6380, TLS required, password from access keys).
  # Locally Redis is optional — the cache and rate limiter both degrade gracefully if disabled.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: 3s
      connect-timeout: 3s
      # We use Redis only for Spring Cache + a few INCR/EXPIRE keys in RateLimitFilter —
      # no Spring Data Redis repositories. Disable repository scanning so JPA repos don't
      # each trigger a "Could not safely identify store assignment" check at startup.
      repositories:
        enabled: false

  # Spring Cache — uses the Redis connection above. 5-min TTL is a balance between
  # freshness (per-user statistics) and offloading the DB on dashboard refreshes.
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes in ms
      cache-null-values: false

  # Email congiguration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:username@gmail.com}
    password: ${MAIL_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          debug: false

# Server port — uses PORT env var on Render, falls back to 8080 for local dev
server:
  port: ${PORT:8080}

# Logging — reduced to WARN in production, override locally if needed
logging:
  level:
    "[org.hibernate]": ${LOG_LEVEL_HIBERNATE:WARN}
    "[org.hibernate.type.descriptor.sql.BasicBinder]": ${LOG_LEVEL_BINDER:WARN}

# JWT authentication
jwt:
  secret: ${JWT_SECRET:secret}
  expiration: 86400000 # 24 hours in milliseconds

# File storage congiguration
# Only used by LocalFileStorageService (active under any profile except "prod").
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

# Azure Blob Storage — read by AzureBlobStorageService (active only under the "prod" profile).
# Auth: storage-account connection string. Service-principal auth would be cleaner (RBAC, no
# shared secret), but Azure for Students blocks app-registration creation in UiO's tenant —
# connection-string auth is the practical fallback. Treat the connection string as a high-value
# secret and set it as an env var on Render, never commit it.
azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    container-name: ${AZURE_STORAGE_CONTAINER:documents}

# Application configuration
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}