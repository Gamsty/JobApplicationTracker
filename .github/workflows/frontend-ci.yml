# Frontend CI — npm ci, lint, build on every PR touching frontend/ and on push to main.
# Branch protection on main should require this green before merge.
#
# Why npm ci instead of npm install: ci installs from package-lock.json exactly,
# fails fast on lockfile drift, and is significantly faster on cached runners.

name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (exact lockfile, no resolution)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build (catches Vite/typescript errors that lint misses)
        run: npm run build
