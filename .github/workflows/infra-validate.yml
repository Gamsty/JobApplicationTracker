# Bicep validation — runs on PRs that touch infra/. Does two things:
#   1. bicep build to confirm the template compiles
#   2. az deployment group what-if to show the diff against the live RG as a PR comment
#
# Why split from infra-deploy.yml: PRs only validate, never apply. Apply happens on the
# deploy workflow (workflow_dispatch / push to main). This keeps PRs safe to merge —
# nothing in Azure changes until someone deliberately deploys.

name: Infra Validate

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-validate.yml'

concurrency:
  group: infra-validate-${{ github.ref }}
  cancel-in-progress: true

# OIDC needs id-token: write to mint the federated credential. We don't write to the
# repo from this workflow, so contents: read is the only other permission needed.
permissions:
  id-token: write
  contents: read
  pull-requests: write   # required to post the what-if diff as a PR comment

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Compile Bicep to ARM JSON (catches syntax + schema errors)
        run: az bicep build --file infra/main.bicep

      - name: Sign in to Azure via OIDC federated credential
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run what-if against the production RG
        id: whatif
        run: |
          {
            echo 'whatif<<EOF'
            az deployment group what-if \
              --resource-group rg-jobtracker-prod \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post what-if output as a PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Bicep what-if against \`rg-jobtracker-prod\`\n\n\`\`\`\n${{ steps.whatif.outputs.whatif }}\n\`\`\`\n\n_Documented Microsoft what-if false positives (Redis auto-managed memory reserves, etc.) are expected and harmless._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
